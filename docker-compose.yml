services:
  redis:
    image: redis:7-alpine
    container_name: webxemphim-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: webxemphim-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webxemphim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webxemphim"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webxemphim-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/webxemphim?schema=public"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-change_me_access_secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change_me_refresh_secret}"
      NODE_ENV: "${NODE_ENV:-development}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      CLIENT_URL: "http://localhost:3000"
      KKPHIM_API_URL: "https://phimapi.com"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-}"
      SEED_ADMIN_USERNAME: "${SEED_ADMIN_USERNAME:-admin}"
      VIP_PAYMENT_MODE: "${VIP_PAYMENT_MODE:-manual}"
      PAYOS_CLIENT_ID: "${PAYOS_CLIENT_ID:-}"
      PAYOS_API_KEY: "${PAYOS_API_KEY:-}"
      PAYOS_CHECKSUM_KEY: "${PAYOS_CHECKSUM_KEY:-}"
      PAYOS_RETURN_URL: "${PAYOS_RETURN_URL:-http://localhost:3000/vip?payment=success}"
      PAYOS_CANCEL_URL: "${PAYOS_CANCEL_URL:-http://localhost:3000/vip?payment=cancelled}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      BREVO_API_KEY: "${BREVO_API_KEY:-}"
      MAIL_FROM: "${MAIL_FROM:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_SECURE: "${SMTP_SECURE:-true}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      PUBLIC_API_URL: "${PUBLIC_API_URL:-http://localhost:5000/api}"
      PASSWORD_RESET_URL: "${PASSWORD_RESET_URL:-http://localhost:3000/account}"
      REQUIRE_EMAIL_VERIFICATION: "${REQUIRE_EMAIL_VERIFICATION:-false}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webxemphim-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
      INTERNAL_API_URL: "http://backend:5000/api"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  webxemphim-network:
    driver: bridge
