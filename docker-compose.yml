services:
  db:
    image: postgres:15-alpine
    container_name: webxemphim-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webxemphim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webxemphim"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webxemphim-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/webxemphim?schema=public"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-change_me_access_secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change_me_refresh_secret}"
      NODE_ENV: "${NODE_ENV:-development}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      CLIENT_URL: "http://localhost:3000"
      KKPHIM_API_URL: "https://phimapi.com"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-}"
      SEED_ADMIN_USERNAME: "${SEED_ADMIN_USERNAME:-admin}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webxemphim-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
      INTERNAL_API_URL: "http://backend:5000/api"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - webxemphim-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  webxemphim-network:
    driver: bridge
