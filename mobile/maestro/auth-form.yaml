appId: vn.cine3d.app
name: Native authentication form
---
- launchApp:
    clearState: true
- openLink: cine3d://account/auth
- assertVisible:
    id: auth-screen
- tapOn:
    id: auth-email
- inputText: invalid-email
- tapOn:
    id: auth-password
- inputText: short
- tapOn:
    id: auth-submit
- assertVisible: Email không hợp lệ.
